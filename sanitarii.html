<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanitarii Pricepuți - Vocea Elevilor</title>
    
    <!-- Legătura corectă către fișierul de stil extern pentru GitHub Pages -->
    <link rel="stylesheet" href="/RevistaNR4/style.css">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Fundalul paginii adaptat la nuanța caldă din index */
        .article-page { 
            padding: 40px 0 60px 0; 
            background-color: #fefaf6; 
            min-height: 85vh; 
        }
        
        /* Caseta albă a articolului adaptată la tema Portocaliu Premium */
        .article-wrapper { 
            max-width: 800px; 
            margin: 0 auto; 
            background: #ffffff; 
            padding: 40px; 
            border-radius: 16px; 
            box-shadow: 0 4px 20px rgba(234, 88, 12, 0.03); 
            border: 1px solid #ffedd5;
        }
        
        /* Eticheta de categorie portocalie */
        .article-meta { 
            display: inline-block;
            background-color: #ffedd5; 
            color: #ea580c; 
            padding: 4px 12px;
            border-radius: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        
        .article-title { 
            font-family: 'Playfair Display', serif; 
            font-size: 2.5rem; 
            line-height: 1.3; 
            margin-bottom: 25px; 
            color: #0f172a; 
        }
        
        /* Containerul pentru prezentarea Canva integrat frumos în design */
        .canva-embed-container {
            position: relative; 
            width: 100%; 
            height: 0; 
            padding-top: 141.4286%;
            padding-bottom: 0; 
            box-shadow: 0 10px 25px -5px rgba(234, 88, 12, 0.1); 
            margin-top: 1.6em; 
            margin-bottom: 12px; 
            overflow: hidden;
            border-radius: 12px; 
            will-change: transform;
            border: 1px solid #ffedd5;
        }
        .canva-embed-container iframe {
            position: absolute; 
            width: 100%; 
            height: 100%; 
            top: 0; 
            left: 0; 
            border: none; 
            padding: 0; 
            margin: 0;
        }

        .author-tag {
            font-size: 0.85rem; 
            color: #64748b; 
            margin-bottom: 30px;
            font-style: italic;
        }
        
        .author-tag strong {
            color: #ea580c;
        }

        /* Link-ul de întoarcere */
        .back-btn { 
            display: inline-flex; 
            margin-top: 20px; 
            color: #ea580c; 
            text-decoration: none; 
            font-weight: 700; 
            transition: color 0.2s ease;
        }
        .back-btn:hover { 
            color: #c2410c;
            text-decoration: none;
        }

        /* Optimizare pentru telefoane mobile */
        @media (max-width: 768px) {
            .article-wrapper { padding: 20px; border-radius: 8px; }
            .article-title { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <!-- Meniu principal (Navbar) identic cu cel de pe index.html -->
    <nav class="navbar">
        <div class="container">
            <div class="logo">
                <h1>📰 Revista Consiliului Elevilor</h1>
            </div>
            <ul class="nav-links">
                <li><a href="index.html#home">Acasă</a></li>
                <li><a href="index.html#articole" class="active">Articole</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="article-page">
        <div class="container">
            <div class="article-wrapper">
                
                <span class="article-meta">❤️ SĂNĂTATE</span>
                <h1 class="article-title">Sanitarii Pricepuți - Mențiune la etapa județeană</h1>
                
                <!-- Codul tău Canva integrat curat -->
                <div class="canva-embed-container">
                    <iframe loading="lazy" src="https://www.canva.com/design/DAHKIUExNDM/6cEsSdOvO05-K79E38yLeQ/view?embed" allowfullscreen="allowfullscreen" allow="fullscreen">
                    </iframe>
                </div>
                <p class="author-tag">Creat de: <strong>Șuta Diana</strong></p>

                <hr style="border: 0; border-top: 1px dashed #ffedd5; margin-bottom: 20px;">

                <a href="index.html#articole" class="back-btn">← Înapoi la Pagina Principală</a>
            </div>
        </div>
    </main>

    <!-- Subsol (Footer) -->
    <footer>
        <div class="container">
            <p>&copy; 2026 Revista Școlii - Școala Gimnazială Nr. 4 Vulcan. Toate drepturile rezervate.</p>
        </div>
    </footer>

</body>
</html>
